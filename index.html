<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目资源中心</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4895ef;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 2.5rem;
            color: var(--dark-color);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }
        
        h1::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 4px;
            background: var(--accent-color);
            bottom: -10px;
            left: 25%;
            border-radius: 2px;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .project-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        
        .card-header {
            background: var(--primary-color);
            color: white;
            padding: 1.5rem;
        }
        
        .card-header h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .card-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        /* 项目预览图样式 */
        .card-preview {
            width: 100%;
            height: 180px;
            overflow: hidden;
            cursor: pointer;
            display: block;
        }
        .card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .card-preview:hover img {
            transform: scale(1.08);
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        .card-body p {
            color: var(--dark-color);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .download-btn {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-align: center;
        }
        
        .download-btn:hover {
            background: var(--secondary-color);
            transform: scale(1.05);
        }
        
        footer {
            text-align: center;
            margin-top: 3rem;
            color: var(--dark-color);
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
            .card-preview {
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>项目资源中心</h1>
            <p>所有项目资源文件下载链接</p>
        </header>
        
        <div class="projects-grid">
            <!-- 项目卡片1：餐具目标检测 -->
            <div class="project-card">
                <div class="card-header">
                    <h2>餐具目标检测</h2>
                    <p>项目负责人 · 2025年01月</p>
                </div>
                <!-- 点击图片跳转预览网页 shturl.cc/MZfe0yTSC -->
                <a class="card-preview" href="./屏幕截图 2026-06-25 233151.png" target="_blank" title="点击查看餐具检测项目详情">
                    <!-- 后续上传截图到GitHub后替换src为raw图片链接 -->
                    <img src="" alt="餐具目标检测项目预览图">
                </a>
                <div class="card-body">
                    <p>基于deeplabv3+的餐具语义分割系统，包含完整的数据集、模型代码和文档说明。</p>
                    <a href="https://pan.baidu.com/s/1fdZtJDdTyDQJBM4hryUilw?pwd=wxdy" class="download-btn" target="_blank">下载资源</a>
                </div>
            </div>
            
            <!-- 项目卡片2：道路病害检查 -->
            <div class="project-card">

                    <h2>道路病害检查</h2>
                    <p>算法实现和数据标注 · 2026年1月</p>
                </div>
                <!-- 点击图片跳转预览网页 shturl.cc/z6QRjE8zk -->
                <a class="card-preview" href="./屏幕截图 2026-06-26 220527.png" target="_blank" title="点击查看道路检测项目详情">
                    <img src="" alt="道路病害检查项目预览图">
                </a>
                <div class="card-body">
                    <p>基于ROI与OpenCV边缘检测的道路病害检查分析项目，包含预处理代码、训练模型和测试数据集。</p>
                    <a href="https://pan.baidu.com/s/1gClwwQKiiswtEKscB6JnZw?pwd=n9eq" class="download-btn" style="background: #3a86ff;" target="_blank">下载资源</a>
                </div>
            </div>
            
            <!-- 项目卡片3：政治练习软件 -->
            <div class="project-card">
                <div class="card-header" style="background: #7209b7;">
                    <h2>政治练习软件</h2>
                    <p>数据标注与模型调参 · 2026年4月</p>
                </div>
                <!-- 点击图片跳转预览网页 shturl.cc/R5hkmCZke -->
                <a class="card-preview" href="./屏幕截图 2026-05-09 230805.png" target="_blank" title="点击查看政治主观题判分项目详情">
                    <img src="" alt="政治主观题判分项目预览图">

                <div class="card-body">

                    <a href="https://pan.baidu.com/s/1MLrO1MqePfGIBbCuTwgIHw?pwd=gj3i" class="download-btn" style="background: #7209b7;" target="_blank">下载资源</a>
                </div>
            </div>
        </div>
        
        <footer>
            <p>© 2026 项目资源中心 | 所有资源仅供学习参考</p>
        </footer>
    </div>
</body>
</html>
